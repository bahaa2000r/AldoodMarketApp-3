workflows:
  android-apk:
    name: Build Android APK
    max_build_duration: 60

    environment:
      flutter: stable

    scripts:
      - name: Prepare Android project
        script: |
          flutter create --platforms=android .

      - name: Get packages
        script: |
          flutter pub get

      - name: Build APK
        script: |
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
