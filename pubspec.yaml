name: aldood_market_android_final
description: النسخة النهائية المبدئية Flutter Android لبرنامج الدود ماركت مع تسجيل دخول وتلجرام.
publish_to: "none"
version: 1.0.0+3

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.4
  http: ^1.2.2
  shared_preferences: ^2.3.2
  file_picker: ^8.1.2
  excel: ^4.0.6
  archive: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/aldood_logo.png
